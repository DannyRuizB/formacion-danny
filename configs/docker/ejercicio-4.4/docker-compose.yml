# Stack del ejercicio 4.4: PostgreSQL + app Node + Nginx reverse proxy.
# El unico puerto publicado al host es el 8082 → Nginx (80 dentro del contenedor).
# La app y la base de datos solo son accesibles dentro de la red "backend".

services:

  db:
    image: postgres:16
    container_name: stack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: miapp
      POSTGRES_USER: miapp
      POSTGRES_PASSWORD: secret123
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miapp -d miapp"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: miapp:1.0
    container_name: stack-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://miapp:secret123@db:5432/miapp
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: stack-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
