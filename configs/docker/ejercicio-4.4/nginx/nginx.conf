# Reverse proxy hacia la app Node del stack de Compose.
# Nginx se ejecuta como contenedor del propio stack y resuelve "app" por DNS interno de Docker.

upstream miapp {
    server app:3000;
}

server {
    listen 80;
    server_name _;

    # Cabeceras tipicas de un reverse proxy
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://miapp;
    }

    # Healthcheck directo a la app (util desde el host)
    location = /health {
        proxy_pass http://miapp/health;
        access_log off;
    }
}
