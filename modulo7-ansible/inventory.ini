# Inventario Ansible — Módulo 7 FCT Zataca
#
# Control node: cliente1 (10.160.218.20)
# Ejecutar ansible desde cliente1 (donde está instalado).
#
# cliente1 actúa también como host objetivo (es nuestro servidor activo:
# Nginx, BIND9, PostgreSQL, MariaDB, miapi…), por eso aparece en webservers
# y dbservers con ansible_connection=local (sin pasar por SSH a sí mismo).

[webservers]
cliente1 ansible_connection=local

[dbservers]
cliente1 ansible_connection=local

[clients]
cliente2 ansible_host=10.160.218.100 ansible_user=soltecsis

[all:vars]
ansible_python_interpreter=/usr/bin/python3
